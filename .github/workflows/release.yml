name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  NODE_VERSION: '20'
  BUN_VERSION: '1.3.11'

jobs:
  # ---------------------------------------------------------
  # Typecheck & Test
  # ---------------------------------------------------------
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - run: bun --cwd packages/opencode typecheck

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - run: bun --cwd packages/opencode test --timeout 30000

  # ---------------------------------------------------------
  # Build Binaries (Linux, macOS, Windows)
  # ---------------------------------------------------------
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    needs: [typecheck, test]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
            target: linux-x64
            asset: antcoder-linux-x64.tar.gz
            binary: antcoder
          - os: ubuntu-latest
            arch: arm64
            target: linux-arm64
            asset: antcoder-linux-arm64.tar.gz
            binary: antcoder
          - os: macos-latest
            arch: x64
            target: darwin-x64
            asset: antcoder-darwin-x64.zip
            binary: antcoder
          - os: macos-latest
            arch: arm64
            target: darwin-arm64
            asset: antcoder-darwin-arm64.zip
            binary: antcoder
          - os: windows-latest
            arch: x64
            target: win32-x64
            asset: antcoder-win32-x64.zip
            binary: antcoder.exe

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: bun --cwd packages/opencode run build --single
        env:
          BUN_TARGET: ${{ matrix.target }}

      - name: Verify binary
        run: |
          ls -la packages/opencode/dist/antcoder-${{ matrix.target }}/bin/${{ matrix.binary }}
          ${{ matrix.os == 'windows-latest' && format('packages/opencode/dist/antcoder-{0}/bin/antcoder.exe --version', matrix.target) || format('packages/opencode/dist/antcoder-{0}/bin/antcoder --version', matrix.target) }}

      - name: Package release artifact
        run: |
          cd packages/opencode/dist/antcoder-${{ matrix.target }}
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            7z a -tzip ../../../../${{ matrix.asset }} bin/${{ matrix.binary }}
          else
            tar -czf ../../../../${{ matrix.asset }} bin/${{ matrix.binary }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          retention-days: 1

  # ---------------------------------------------------------
  # Build Linux AppImage
  # ---------------------------------------------------------
  build-appimage:
    name: Build AppImage (Linux)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fuse libfuse2 libglib2.0-0 libappindicator3-1
          # Install linuxdeploy and appimagetool
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: antcoder-linux-*.tar.gz

      - name: Extract binaries
        run: |
          mkdir -p binaries
          tar -xzf artifacts/antcoder-linux-x64.tar.gz -C binaries
          mv binaries/bin/antcoder binaries/antcoder-x64
          tar -xzf artifacts/antcoder-linux-arm64.tar.gz -C binaries
          mv binaries/bin/antcoder binaries/antcoder-arm64

      - name: Build AppImage (x64)
        run: |
          mkdir -p AppDir-x64/usr/bin
          cp binaries/antcoder-x64 AppDir-x64/usr/bin/antcoder
          # Create .desktop and icon (simplified)
          cat > AppDir-x64/antcoder.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=AntCoder
          Exec=antcoder
          Icon=antcoder
          Terminal=true
          Categories=Development;IDE;
          EOF
          # Build
          ARCH=x86_64 ./linuxdeploy-x86_64.AppImage --appdir AppDir-x64 --output appimage

      - name: Build AppImage (arm64)
        run: |
          mkdir -p AppDir-arm64/usr/bin
          cp binaries/antcoder-arm64 AppDir-arm64/usr/bin/antcoder
          cat > AppDir-arm64/antcoder.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=AntCoder
          Exec=antcoder
          Icon=antcoder
          Terminal=true
          Categories=Development;IDE;
          EOF
          ARCH=aarch64 ./linuxdeploy-x86_64.AppImage --appdir AppDir-arm64 --output appimage

      - name: Upload AppImages
        uses: actions/upload-artifact@v4
        with:
          name: appimages
          path: |
            AntCoder-*.AppImage
          retention-days: 1

  # ---------------------------------------------------------
  # Build Windows Installer (NSIS)
  # ---------------------------------------------------------
  build-windows-installer:
    name: Build Windows Installer
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: antcoder-win32-x64.zip

      - name: Extract binary
        run: |
          Expand-Archive artifacts/antcoder-win32-x64.zip -DestinationPath bin
          ls bin/

      - name: Install NSIS
        run: choco install nsis

      - name: Build installer
        run: |
          # Copy NSIS script
          cp scripts/installer.nsi installer.nsi
          # Update version
          $version = "${{ github.ref_name }}".TrimStart('v')
          (Get-Content installer.nsi) -replace '!define APP_VERSION ".*"', "!define APP_VERSION `"$version`"" | Set-Content installer.nsi
          # Build
          makensis installer.nsi

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: AntCoder-*-windows-x64-setup.exe
          retention-days: 1

  # ---------------------------------------------------------
  # Create Release
  # ---------------------------------------------------------
  release:
    name: Create GitHub Release
    needs: [build, build-appimage, build-windows-installer]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: '*'
          merge-multiple: true

      - name: List assets
        run: |
          find release-assets -type f -name "*.tar.gz" -o -name "*.zip" -o -name "*.AppImage" -o -name "*.exe" | sort

      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: AntCoder ${{ github.ref_name }}
          body: |
            ## AntCoder ${{ github.ref_name }}
            
            Local-only AI coding agent with llama.cpp backend.
            
            ### Installation
            
            **Linux/macOS:**
            ```bash
            curl -fsSL https://github.com/Shahriar-Antu/AntCoder/releases/download/${{ github.ref_name }}/antcoder-$(uname -s | tr '[:upper:]' '[:lower:]')-$(uname -m).tar.gz | tar -xz -C ~/.local/bin
            ```
            
            **Windows:**
            Download `AntCoder-${{ github.ref_name }}-windows-x64-setup.exe` and run.
            
            ### Assets
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
          files: |
            release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}